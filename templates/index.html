<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Sender</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Excel → WhatsApp Schedule Sender</h1>
      <a href="{{ url_for('logout') }}" class="logout-btn">Sign out</a>
    </div>

    <div class="card">
      <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
          <label for="file">Excel File <span class="required">*</span></label>
          <input type="file" id="file" name="file" accept=".xlsx,.xls" required />
        </div>

        <div class="form-group">
          <label for="class">Class <span class="optional">(leave blank for all classes)</span></label>
          <input type="text" id="class" name="class" placeholder="e.g. 9"
                 value="{{ session.get('last_class', request.form.get('class', '')) }}" />
        </div>

        <div class="form-group">
          <label for="date">Date <span class="optional">(leave blank for today)</span></label>
          <input type="date" id="date" name="date"
                 value="{{ session.get('last_date', request.form.get('date', '')) }}" />
        </div>

        <button type="submit" class="btn btn-preview">Preview</button>
      </form>
    </div>

    {% if error %}
    <div class="card error">
      <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}

    {% if preview %}
    <div class="card preview-card">
      <h2>Preview</h2>
      <pre>{{ preview }}</pre>

      <form action="/send" method="POST">
        <button type="submit" class="btn btn-send">Send via WhatsApp</button>
      </form>
    </div>
    {% endif %}
  </div>
</body>
</html>
